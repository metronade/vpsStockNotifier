services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpsnotifier-backend
    restart: unless-stopped
    ports:
      - "8523:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/app.db
      - LOG_DIR=/app/logs
    networks:
      - vpsnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: vpsnotifier-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8523
    depends_on:
      - backend
    networks:
      - vpsnet

networks:
  vpsnet:
    driver: bridge
